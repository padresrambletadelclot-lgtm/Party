<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Fiesta - Grupo de 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-blur { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Se añade data-type="module" para que Babel soporte los imports de Firebase -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;
        
        // --- Firebase Imports ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN DE FIREBASE E IDENTIFICADORES
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDQyErKNcfVHbw1mXB_AA5mOH8oUUi6U14",
                authDomain: "party-f10b7.firebaseapp.com",
                projectId: "party-f10b7",
                storageBucket: "party-f10b7.firebasestorage.app",
                messagingSenderId: "1076171573857",
                appId: "1:1076171573857:web:943c89fd6971230b06b820"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : "party-f10b7"; 

        function App() {
            const [user, setUser] = useState(null);
            const [items, setItems] = useState([]);
            const [hostRules, setHostRules] = useState({ wishlist: '', noList: '' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isHostMode, setIsHostMode] = useState(false);
            const [loading, setLoading] = useState(true);

            const [itemName, setItemName] = useState('');
            const [quantity, setQuantity] = useState('1');
            const [userName, setUserName] = useState(localStorage.getItem('party_user_name') || '');

            // 1. Autenticación (Regla 3: Auth antes de Queries)
            useEffect(() => {
                const initAuth = async () => {
                    try { 
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { 
                        console.error("Error de Autenticación:", e); 
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Sincronización en Tiempo Real
            useEffect(() => {
                if (!user) return;

                // Listener de items
                const itemsCol = collection(db, 'artifacts', appId, 'public', 'data', 'items');
                const unsubItems = onSnapshot(itemsCol, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Ordenamos en memoria (Regla 2)
                    setItems(data.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)));
                    setLoading(false);
                }, (err) => {
                    console.error("Error al leer items:", err);
                    setLoading(false);
                });

                // Listener de reglas
                const rulesDoc = doc(db, 'artifacts', appId, 'public', 'data', 'hostRules', 'global');
                const unsubRules = onSnapshot(rulesDoc, (snap) => {
                    if (snap.exists()) setHostRules(snap.data());
                }, (err) => console.error("Error al leer reglas:", err));

                return () => { unsubItems(); unsubRules(); };
            }, [user]);

            // Efecto para actualizar iconos de Lucide
            useEffect(() => {
                if (!loading) lucide.createIcons();
            }, [loading, items, isModalOpen, isHostMode]);

            const addItem = async (e) => {
                e.preventDefault();
                if (!itemName || !userName || !user) return;
                
                localStorage.setItem('party_user_name', userName);
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'items'), {
                        name: itemName,
                        quantity: quantity,
                        contributor: userName,
                        userId: user.uid,
                        timestamp: Date.now()
                    });
                    setItemName(''); 
                    setQuantity('1');
                    setIsModalOpen(false);
                } catch (err) {
                    console.error("Error al añadir item:", err);
                }
            };

            const deleteItem = async (id) => {
                if (!user) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id));
                } catch (err) {
                    console.error("Error al borrar item:", err);
                }
            };

            const updateRules = async () => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'hostRules', 'global'), hostRules);
                    setIsHostMode(false);
                } catch (err) {
                    console.error("Error al actualizar reglas:", err);
                }
            };

            if (loading && !user) return (
                <div className="flex h-screen items-center justify-center bg-white">
                    <div className="h-10 w-10 animate-spin rounded-full border-4 border-blue-600 border-t-transparent"></div>
                </div>
            );

            return (
                <div className="mx-auto max-w-md min-h-screen pb-24 px-4 bg-slate-50">
                    <header className="py-8 flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-black text-slate-900 tracking-tight leading-none">Grupo de 10</h1>
                            <p className="text-xs font-bold text-blue-600 uppercase tracking-widest mt-2 flex items-center gap-1">
                                <span className="inline-block w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span>
                                {items.length} cosas confirmadas
                            </p>
                        </div>
                        <button 
                            onClick={() => setIsHostMode(true)}
                            className="w-12 h-12 flex items-center justify-center bg-white rounded-2xl shadow-sm border border-slate-200 text-slate-400 hover:text-blue-600 transition-all active:scale-95"
                        >
                            <i data-lucide="settings-2" className="w-6 h-6"></i>
                        </button>
                    </header>

                    <div className="grid gap-4 mb-10">
                        <div className="bg-white border-l-4 border-emerald-500 p-5 rounded-2xl shadow-sm">
                            <h3 className="text-[10px] font-black text-emerald-600 uppercase mb-1 flex items-center gap-2">
                                <i data-lucide="check-circle" className="w-3 h-3"></i> Wishlist del Anfitrión
                            </h3>
                            <p className="text-sm text-slate-700 font-medium italic">
                                {hostRules.wishlist || "El anfitrión aún no ha pedido nada específico."}
                            </p>
                        </div>
                        <div className="bg-white border-l-4 border-rose-500 p-5 rounded-2xl shadow-sm">
                            <h3 className="text-[10px] font-black text-rose-600 uppercase mb-1 flex items-center gap-2">
                                <i data-lucide="alert-triangle" className="w-3 h-3"></i> No traer (Ya tenemos)
                            </h3>
                            <p className="text-sm text-slate-700 font-medium italic">
                                {hostRules.noList || "¡Podéis traer lo que queráis!"}
                            </p>
                        </div>
                    </div>

                    <div className="space-y-3">
                        <h2 className="text-sm font-black text-slate-400 uppercase tracking-widest px-1">¿Quién trae qué?</h2>
                        {items.length === 0 && !loading && (
                            <div className="text-center py-16 bg-white rounded-[32px] border-2 border-dashed border-slate-200">
                                <i data-lucide="shopping-bag" className="w-12 h-12 text-slate-200 mx-auto mb-3"></i>
                                <p className="text-slate-400 font-bold">La lista está vacía</p>
                            </div>
                        )}
                        {items.map((item) => (
                            <div key={item.id} className="bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm flex justify-between items-center animate-in">
                                <div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-bold text-slate-800 text-lg leading-tight">{item.name}</span>
                                        <span className="bg-blue-100 text-blue-700 text-xs px-2.5 py-0.5 rounded-lg font-black">x{item.quantity}</span>
                                    </div>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-wider">Llevado por {item.contributor}</p>
                                </div>
                                {item.userId === user?.uid && (
                                    <button 
                                        onClick={() => deleteItem(item.id)} 
                                        className="p-3 text-slate-200 hover:text-rose-500 transition-colors"
                                    >
                                        <i data-lucide="trash-2" className="w-5 h-5"></i>
                                    </button>
                                )}
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => setIsModalOpen(true)}
                        className="fixed bottom-8 right-6 w-16 h-16 bg-blue-600 text-white rounded-3xl shadow-2xl shadow-blue-200 flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40"
                    >
                        <i data-lucide="plus" className="w-9 h-9"></i>
                    </button>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 modal-blur z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 animate-in">
                            <div className="bg-white w-full max-w-md rounded-t-[40px] sm:rounded-[40px] p-8 shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black tracking-tight">¿Qué vas a traer?</h2>
                                    <button 
                                        onClick={() => setIsModalOpen(false)} 
                                        className="bg-slate-100 p-2.5 rounded-full hover:bg-slate-200"
                                    >
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <form onSubmit={addItem} className="space-y-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">Tu Nombre</label>
                                        <input required placeholder="Ej: Nacho" value={userName} onChange={e => setUserName(e.target.value)} className="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-800" />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-[3] space-y-1">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">¿Qué es?</label>
                                            <input required placeholder="Ej: Patatas fritas" value={itemName} onChange={e => setItemName(e.target.value)} className="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-800" />
                                        </div>
                                        <div className="flex-1 space-y-1">
                                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest text-center block">Cant.</label>
                                            <input type="number" min="1" value={quantity} onChange={e => setQuantity(e.target.value)} className="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-black text-center text-slate-800" />
                                        </div>
                                    </div>
                                    <button className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition-all text-lg tracking-tight">
                                        APUNTAR EN LA LISTA
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {isHostMode && (
                        <div className="fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-4 animate-in">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-10 shadow-2xl">
                                <h2 className="text-3xl font-black mb-2 tracking-tight">Anfitrión</h2>
                                <p className="text-slate-400 text-sm font-bold mb-8 uppercase tracking-widest">Gestiona las necesidades</p>
                                <div className="space-y-6">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-emerald-600 ml-1 tracking-widest">Wishlist (Lo que falta)</label>
                                        <textarea value={hostRules.wishlist} onChange={e => setHostRules({...hostRules, wishlist: e.target.value})} className="w-full p-4 bg-emerald-50 rounded-2xl outline-none min-h-[100px] font-medium border-none text-emerald-900 placeholder-emerald-200" placeholder="Ej: Hielo, vasos..." />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-rose-600 ml-1 tracking-widest">No traer (Ya hay)</label>
                                        <textarea value={hostRules.noList} onChange={e => setHostRules({...hostRules, noList: e.target.value})} className="w-full p-4 bg-rose-50 rounded-2xl outline-none min-h-[100px] font-medium border-none text-rose-900 placeholder-rose-200" placeholder="Ej: Cerveza, patatas..." />
                                    </div>
                                    <div className="flex gap-4 pt-4">
                                        <button onClick={() => setIsHostMode(false)} className="flex-1 font-black text-slate-400 text-sm uppercase tracking-widest">Cancelar</button>
                                        <button onClick={updateRules} className="flex-[2] bg-slate-900 text-white py-5 rounded-2xl font-black text-lg tracking-tight shadow-2xl active:scale-95 transition-all">
                                            ACTUALIZAR
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
